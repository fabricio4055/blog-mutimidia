<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Postagem | Laboratorio de Midias e Tecnologias</title>
    <meta name="description" content="Pagina individual das postagens do blog." />
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container">
        <p class="site-name"><a href="index.html">Laboratorio de Midias e Tecnologias</a></p>
        <h1 class="page-title page-title-small">Postagem do blog</h1>
        <p class="page-subtitle">Leitura individual de textos, videos, projetos e demais registros.</p>

        <nav class="site-nav">
          <a href="index.html">Inicio</a>
          <a href="index.html#postagens">Postagens</a>
          <a href="index.html#sobre">Sobre</a>
        </nav>
      </div>
    </header>

    <main class="container page-layout post-layout">
      <section class="main-column">
        <a class="back-link" href="index.html#postagens">&larr; Voltar para a pagina inicial</a>
        <section id="post-header"></section>
        <section id="post-body"></section>
      </section>

      <aside class="sidebar">
        <section class="sidebar-box card" id="post-info"></section>

        <section class="sidebar-box card" id="related-section">
          <h2>Outras postagens</h2>
          <div class="recent-posts" id="related-posts"></div>
        </section>
      </aside>
    </main>

    <footer class="site-footer">
      <div class="container">
        <p>Blog pessoal criado para registrar atividades, textos e projetos academicos.</p>
      </div>
    </footer>

    <script src="assets/js/posts.js"></script>
    <script src="assets/js/app.js"></script>
    <script src="assets/js/post.js"></script>
  </body>
</html>
